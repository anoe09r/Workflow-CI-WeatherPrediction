name: MLflow CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_TRACKING_URI: "https://dagshub.com/anoe09r/Colab_Eksperimen.mlflow"

    steps:
      # =========================
      # 1. Clone Repository
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # =========================
      # 2. Setup Python
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: "pip"

      # =========================
      # 3. Install Dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow dagshub

      # =====================================
      # 4. Run Training
      # =====================================
      - name: Run Training Script
        run: |
          cd MLProject
          python modelling_tuning.py

      # =========================
      # 5. Get Run ID
      # =========================
      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get Run ID
        run: |
          cd MLProject

          if [ -f run_id.txt ]; then
            RUN_ID=$(cat run_id.txt)
            echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
            echo "Run ID: $RUN_ID"
          fi

      # =========================
      # 6. Upload Model Artifact
      # =========================
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: best-tuning-model
          path: MLProject/best_tuning_model/

      # =========================
      # 7. Commit Processed Dataset
      # =========================
      - name: Commit Processed Dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add .

          git commit -m "chore: auto-update processed dataset" || echo "No changes to commit"

          git push
