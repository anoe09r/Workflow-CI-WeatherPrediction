name: MLflow CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_TRACKING_URI: "https://dagshub.com/anoe09r/Colab_Eksperimen.mlflow"

    steps:
      # =========================
      # 1. Clone Repository
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          
      # =========================
      # 2. Setup GitHub LFS
      # =========================
      - name: Checkout LFS objects
        run: git lfs checkout

      # =========================
      # 3. Setup Python
      # =========================
      - name: Set up Python
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12.7"
          cache: "pip"

      - name: Check Env
        run: |
          python --version
          
      # =========================
      # 4. Install Dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow dagshub

      # =====================================
      # 5. Run Training
      # =====================================
      - name: Run mlflow project
        run: |
          export PATH="$CONDA/bin:$PATH"
          cd MLProject
          MLFLOW_TRACKING_USERNAME=$MLFLOW_TRACKING_USERNAME \
          MLFLOW_TRACKING_PASSWORD=$MLFLOW_TRACKING_PASSWORD \
          MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI \
          mlflow run .

      # =========================
      # 6. Get Run ID
      # =========================
      - name: Run MLflow Project
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Successfully fetched Run ID: $RUN_ID for DagsHub retrieval."

      # =========================
      # 7. Install Python dependencies
      # =========================
      - name: Install Python dependencies
        run: |
          echo "Dependensi tambahan sudah terinstall."
          
      # =========================
      # 8. Upload Model Artifact
      # =========================
      - name: Upload to Github LFS
        uses: actions/upload-artifact@v7
        with:
          name: weather-tuning-model
          path: MLProject/saved_model/

      # =========================
      # 9. Commit Processed Dataset
      # =========================
      - name: Debug MLflow artifacts
        run: |
          export MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI
          export MLFLOW_TRACKING_USERNAME=$MLFLOW_TRACKING_USERNAME
          export MLFLOW_TRACKING_PASSWORD=$MLFLOW_TRACKING_PASSWORD

          mlflow artifacts list -r $RUN_ID
          
      # =========================
      # 10. Commit Processed Dataset
      # =========================
      - name: Commit Processed Dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add .

          git commit -m "chore: auto-update processed dataset" || echo "No changes to commit"

          git push
